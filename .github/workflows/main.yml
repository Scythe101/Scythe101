name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "*/30 * * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@3.34
        with:
          token: ${{ secrets.METRICS }}
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          # The following additional scopes may be required:
          #  - read:org      (for organization related metrics)
          #  - read:user     (for user related data)
          #  - read:packages (for some packages related data)
          #  - repo          (optional, if you want to include private repositories)
          

          # Options
          user: Scythe101
          template: classic
          base: header, repositories, activity, community, metadata
          config_timezone: America/Los_Angeles
          plugin_repositories: yes
          plugin_repositories_featured: scythe101.github.io, htmlclickergame, blahajBot, MatricesCalculator, SummationCalc 
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
          plugin_topics: yes
          plugin_topics_mode: icons
          plugins_topics_sort: starred
          plugin_topics_limit: 10

          plugin_lines: yes
          plugin_lines_repositories_limit: 2
          
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: chart
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_achievements: yes
          plugin_achievements_limit: 15
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_token: ${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          plugin_music_mode: top
          plugin_music_time_range: short
          plugin_music_top_type: tracks
          plugin_music_limit: 5
          plugin_16personalities: yes
          plugin_16personalities_scores: yes
          plugin_16personalities_sections: personality, traits
          plugin_16personalities_url: ${{ secrets.PERSONALITIES }}
